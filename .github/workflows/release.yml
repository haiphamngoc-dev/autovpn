name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AutoVPN ${{ github.ref_name }}"
          releaseBody: |
            ## What's New in AutoVPN ${{ github.ref_name }} 🚀

            We are excited to release AutoVPN ${{ github.ref_name }}, featuring a major upgrade to real-time system monitoring, enhanced system tray controls, and optimized continuous integration!

            ### Key Enhancements:
            * 📊 **Real-time Activity Console**: Added a high-performance terminal console directly on the home page displaying detailed NetworkManager VPN activities (connection, failure, and state transitions) in real-time.
            * 💾 **State Persistence**: Log logs are buffered securely in the Rust backend (`std::sync::OnceLock`), ensuring your log history is preserved perfectly across page navigations and settings changes.
            * 🎨 **Adaptive Themes**: The log console background dynamically inherits native Mantine theme properties (`var(--mantine-color-default-hover)`), rendering beautifully in both Light & Dark modes.
            * 📐 **Smart Collapsible Layout**: The console can be collapsed or expanded at will. Your preference is persisted automatically using local storage.
            * ⚙️ **Tray Controls Simplified**: Simplified the tray system "Reconnect" option for a cleaner menu aesthetics.
            * 🛠️ **DevOps & CI/CD**: Seamless GitHub Actions automated packaging (Node.js 24 runtime, advanced cache layers) to build and release `.deb` packages effortlessly.

            Enjoy secure, automated, and beautiful VPN controls on Linux!
          releaseDraft: false
          prerelease: false
