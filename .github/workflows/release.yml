name: "Publish Release"

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AutoVPN ${{ github.ref_name }}"
          releaseBody: |
            AutoVPN version ${{ github.ref_name }} contains new enhancements and user experience updates:
            - **Dynamic Multi-part Password Builder**: Allows users to dynamically structure VPN credentials with a mix of base password and multiple dynamic OTP/TOTP parts, complete with sequence ordering, field validation, and a live centered format preview block.
            - **Connection Cancellation**: Introduces a "Cancel" (Hủy) action button on the connection status card when in the "Connecting" state, letting users abort connection attempts without interface hang time.
            - **Legacy Credentials Migration**: Automatic, backward-compatible migration for configuration files generated by older versions of AutoVPN.
          releaseDraft: false
          prerelease: false

      - name: Generate and Update updater.json
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}

          TAR_PATH=$(find src-tauri/target/release/bundle -name "*.AppImage" | head -n 1)
          SIG_PATH=$(find src-tauri/target/release/bundle -name "*.AppImage.sig" | head -n 1)

          if [ -z "$TAR_PATH" ] || [ -z "$SIG_PATH" ]; then
            TAR_PATH=$(find src-tauri/target/release/bundle -name "*.tar.gz" ! -name "control.tar.gz" ! -name "data.tar.gz" | head -n 1)
            SIG_PATH=$(find src-tauri/target/release/bundle -name "*.sig" ! -name "*control*" ! -name "*data*" | head -n 1)
          fi

          if [ -n "$SIG_PATH" ] && [ -n "$TAR_PATH" ]; then
            SIGNATURE=$(cat "$SIG_PATH")
            TAR_NAME=$(basename "$TAR_PATH")
            
            cat <<EOF > updater.json
          {
            "version": "$VERSION_NUM",
            "notes": "Release AutoVPN $VERSION with auto-update support.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/haiphamngoc-dev/autovpn/releases/download/$VERSION/$TAR_NAME"
              }
            }
          }
          EOF
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            git add updater.json
            git commit -m "chore: update updater.json for version $VERSION [skip ci]" || true
            git push origin HEAD:main || true
          else
            echo "No signature or update package file found, skipping updater.json update"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
